name: Test ticket_key_regex input (deprecated)
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: pull_request
      GITHUB_REF: refs/pull/4/merge
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create mock PR event payload with ticket key in title
        run: |
          mkdir -p /tmp/mock-event
          cat > /tmp/mock-event/event.json <<'EOF'
          {
            "action": "opened",
            "pull_request": {
              "number": 4,
              "title": "fix: resolve bug JIRA-567",
              "head": {
                "ref": "fix/jira-567",
                "sha": "jkl012"
              },
              "base": {
                "ref": "main"
              },
              "labels": []
            },
            "repository": {
              "name": "test-repo",
              "full_name": "test-owner/test-repo",
              "owner": {
                "login": "test-owner"
              }
            }
          }
          EOF

      - id: action
        uses: .
        env:
          GITHUB_EVENT_PATH: /tmp/mock-event/event.json
        with:
          task_types: '["feat","fix","docs","test","ci","refactor","perf","chore","revert"]'
          ticket_key_regex: 'JIRA-\d{2,5}$'
          add_label: 'false'

      - name: Assert action completed successfully with ticket_key_regex
        run: |
          echo "Action completed with ticket_key_regex (deprecated) validation"
          echo "PASS"
