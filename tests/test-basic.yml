name: Test basic usage with task_types
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create PR event payload
        run: |
          cat > /tmp/pr_event.json <<'EOF'
          {
            "action": "opened",
            "pull_request": {
              "number": 1,
              "title": "feat: add new feature",
              "labels": []
            },
            "repository": {
              "name": "test-repo",
              "owner": {
                "login": "test-owner"
              }
            }
          }
          EOF
      - id: action
        uses: .
        with:
          task_types: '["feat","fix","docs","test","ci","refactor","perf","chore","revert"]'
          add_label: 'false'
          token: 'dummy-token'
        env:
          GITHUB_EVENT_NAME: pull_request
          GITHUB_EVENT_PATH: /tmp/pr_event.json
          GITHUB_REF: refs/pull/1/merge
          GITHUB_HEAD_REF: feature-branch
          GITHUB_BASE_REF: main
      - name: Assert action succeeded
        run: |
          echo "Action completed successfully with valid conventional commit title"
          echo "PASS"
