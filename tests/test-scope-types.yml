name: Test scope_types input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create PR event payload with scoped title
        run: |
          cat > /tmp/pr_event_scope.json <<'EOF'
          {
            "action": "opened",
            "pull_request": {
              "number": 2,
              "title": "fix(login): fix message in login page",
              "labels": []
            },
            "repository": {
              "name": "test-repo",
              "owner": {
                "login": "test-owner"
              }
            }
          }
          EOF
      - id: action
        uses: .
        with:
          task_types: '["feat","fix","docs","test","ci","refactor","perf","chore","revert"]'
          scope_types: '["login","signup","checkout","payment",""]'
          add_label: 'false'
          token: 'dummy-token'
        env:
          GITHUB_EVENT_NAME: pull_request
          GITHUB_EVENT_PATH: /tmp/pr_event_scope.json
          GITHUB_REF: refs/pull/2/merge
          GITHUB_HEAD_REF: feature-login
          GITHUB_BASE_REF: main
      - name: Assert action succeeded with valid scope
        run: |
          echo "Action completed successfully with valid scope type"
          echo "PASS"
