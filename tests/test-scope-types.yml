name: Test scope_types input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: pull_request
      GITHUB_REF: refs/pull/2/merge
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create mock PR event payload with scoped title
        run: |
          mkdir -p /tmp/mock-event
          cat > /tmp/mock-event/event.json <<'EOF'
          {
            "action": "opened",
            "pull_request": {
              "number": 2,
              "title": "fix(login): fix message in login page",
              "head": {
                "ref": "fix/login-message",
                "sha": "def456"
              },
              "base": {
                "ref": "main"
              },
              "labels": []
            },
            "repository": {
              "name": "test-repo",
              "full_name": "test-owner/test-repo",
              "owner": {
                "login": "test-owner"
              }
            }
          }
          EOF

      - id: action
        uses: .
        env:
          GITHUB_EVENT_PATH: /tmp/mock-event/event.json
        with:
          task_types: '["feat","fix","docs","test","ci","refactor","perf","chore","revert"]'
          scope_types: '["login","signup","checkout","payment",""]'
          add_label: 'false'

      - name: Assert action completed successfully with scope_types
        run: |
          echo "Action completed with scope_types validation"
          echo "PASS"
