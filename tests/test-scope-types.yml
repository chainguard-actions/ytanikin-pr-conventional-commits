name: Test scope_types validation
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          task_types: '["feat","fix","docs","test","ci","refactor","perf","chore","revert"]'
          scope_types: '["login","signup","checkout","payment",""]'
          add_label: 'false'
          add_scope_label: 'false'
          token: 'dummy-token'
        env:
          GITHUB_EVENT_NAME: pull_request
          GITHUB_REF: refs/pull/2/merge
          GITHUB_HEAD_REF: fix-login-message
          GITHUB_BASE_REF: main
          GITHUB_EVENT_PATH: ${{ github.workspace }}/actions/hardened/ytanikin--pr-conventional-commits/1.4.2/tests/fixtures/pr-event-scoped.json
      - name: Assert action completed with scope_types
        run: |
          echo "Action completed successfully with scope_types input"
          echo "PASS"
