name: Test title_regex input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: pull_request
      GITHUB_REF: refs/pull/3/merge
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create mock PR event payload with ticket in title
        run: |
          mkdir -p /tmp/mock-event
          cat > /tmp/mock-event/event.json <<'EOF'
          {
            "action": "opened",
            "pull_request": {
              "number": 3,
              "title": "feat: add new feature PROJECT-1234",
              "head": {
                "ref": "feature/project-1234",
                "sha": "ghi789"
              },
              "base": {
                "ref": "main"
              },
              "labels": []
            },
            "repository": {
              "name": "test-repo",
              "full_name": "test-owner/test-repo",
              "owner": {
                "login": "test-owner"
              }
            }
          }
          EOF

      - id: action
        uses: .
        env:
          GITHUB_EVENT_PATH: /tmp/mock-event/event.json
        with:
          task_types: '["feat","fix","docs","test","ci","refactor","perf","chore","revert"]'
          title_regex: 'PROJECT-\d{2,5}$'
          add_label: 'false'

      - name: Assert action completed successfully with title_regex
        run: |
          echo "Action completed with title_regex validation"
          echo "PASS"
